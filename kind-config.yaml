# three node (two workers) cluster config
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
    extraMounts:
      - hostPath: /home/corneliusmaximus/persistentVolume/folder1
        containerPath: /some/path/in/container
  - role: worker
    extraMounts:
      - hostPath: /home/corneliusmaximus/persistentVolume/folder2
        containerPath: /some/path/in/container
